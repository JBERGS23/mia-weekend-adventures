</script>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mia's Weekend Adventures</title>
<style>
:root {
  color-scheme: light;
  --bg: #FDFCFA;
  --surface: #FFFFFF;
  --border: #EDE9E2;
  --border2: #DDD7CE;
  --text: #1A1714;
  --muted: #7A7268;
  --muted2: #A89F95;
  --jeff: #2563EB;
  --jeff-bg: #EFF6FF;
  --tania: #DB2777;
  --tania-bg: #FDF2F8;
  --both: #7C3AED;
  --both-bg: #F5F3FF;
  --green: #16A34A;
  --green-bg: #F0FDF4;
  --red: #DC2626;
  --red-bg: #FEF2F2;
  --skip: #D97706;
  --skip-bg: #FFFBEB;
  --done: #059669;
  --done-bg: #ECFDF5;
  --radius: 16px;
  --sh1: 0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh2: 0 4px 16px rgba(0,0,0,.09),0 2px 4px rgba(0,0,0,.04);
  --sh3: 0 20px 48px rgba(0,0,0,.14),0 8px 16px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:300}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{width:40px;height:40px;background:linear-gradient(135deg,#FBBF24,#F59E0B);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 2px 8px rgba(245,158,11,.35);flex-shrink:0}
.hdr-title{font-size:17px;font-weight:800;letter-spacing:-.4px}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.hdr-add{background:var(--text);color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .15s;white-space:nowrap;flex-shrink:0}
.hdr-add:hover{opacity:.85}

/* LAYOUT */
.layout{max-width:1120px;margin:0 auto;padding:26px 20px 60px;display:grid;grid-template-columns:300px 1fr;gap:26px;align-items:start}
@media(max-width:800px){.layout{grid-template-columns:1fr}.cal-section{position:static}}

/* CALENDAR */
.cal-section{position:sticky;top:74px;display:flex;flex-direction:column;gap:14px}
.month-tabs{display:flex;gap:6px}
.mtab{flex:1;padding:8px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .15s;text-align:center}
.mtab.active{background:var(--text);color:#fff;border-color:var(--text)}
.cal-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--sh1);overflow:hidden}
.cal-gh-row{display:grid;grid-template-columns:repeat(7,1fr);background:#F7F5F0}
.cal-gh{font-size:9px;font-weight:800;text-align:center;padding:8px 0;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.cal-gh.wk{color:var(--text)}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.cal-cell{background:var(--surface);min-height:50px;padding:6px 5px;display:flex;flex-direction:column;gap:2px}
.cal-cell.wknd{background:#FFFEF5;cursor:pointer}
.cal-cell.wknd:hover{background:#FFF8E1}
.cal-cell.sel{background:#FFF3CD;box-shadow:inset 0 0 0 2px #F59E0B}
.cal-cell.done-cell{background:#F0FDF4}
.cal-num{font-size:12px;font-weight:700;color:var(--muted2)}
.cal-cell.wknd .cal-num{color:var(--text)}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:1px}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cal-cnt{font-size:9px;color:var(--muted2);font-weight:600}
.cal-done-check{font-size:10px;margin-top:1px}

/* ACTS SECTION */
.acts-section{display:flex;flex-direction:column;gap:0}
.no-sel{padding:48px 24px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.no-sel .ns-e{font-size:44px;display:block;margin-bottom:12px}
.no-sel h3{font-size:17px;font-weight:800;margin-bottom:6px}
.no-sel p{font-size:13px;color:var(--muted);line-height:1.65}
.day-block{margin-bottom:28px}
.day-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--border)}
.day-name{font-size:21px;font-weight:800;letter-spacing:-.5px}
.day-date{font-size:14px;color:var(--muted);font-weight:500}
.day-badge{margin-left:auto;font-size:11px;background:var(--text);color:#fff;padding:2px 9px;border-radius:20px;font-weight:700}
.day-badge.done-badge{background:var(--done)}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:13px}
.show-more-btn{margin-top:10px;padding:8px;border-radius:10px;border:1.5px dashed var(--border2);background:transparent;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);width:100%;transition:all .15s}
.show-more-btn:hover{background:var(--surface);border-color:var(--muted)}
.empty-day{padding:26px 20px;text-align:center;background:var(--surface);border:1.5px dashed var(--border2);border-radius:var(--radius);color:var(--muted);font-size:13px}

/* CARD */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--sh1);overflow:hidden;transition:box-shadow .18s,transform .18s;cursor:pointer;display:flex;flex-direction:column;position:relative}
.card:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.card.skipped{border-color:#FCD34D;opacity:.9}
.card.went{border-color:var(--done)}
.card-went-banner{background:var(--done-bg);border-bottom:1px solid #A7F3D0;padding:5px 12px;font-size:11px;font-weight:700;color:var(--done);display:flex;align-items:center;gap:5px}
.card-img{height:115px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;z-index:1}
.card-emoji{font-size:44px;position:relative;z-index:2;filter:drop-shadow(0 2px 6px rgba(0,0,0,.18))}
.card-body{padding:13px 13px 8px;flex:1;display:flex;flex-direction:column}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
.cat-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.card-indicators{display:flex;gap:4px;flex-wrap:wrap}
.ind{font-size:10px;padding:1px 5px;border-radius:10px;font-weight:700}
.ind-note{background:#F3F4F6;color:var(--muted)}
.ind-skip{background:var(--skip-bg);color:var(--skip)}
.ind-went{background:var(--done-bg);color:var(--done)}
.card-title{font-size:14px;font-weight:800;line-height:1.3;margin-bottom:4px;letter-spacing:-.2px}
.card-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.card-meta{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.cmeta{font-size:11.5px;color:var(--muted);display:flex;gap:5px;align-items:flex-start}
.cmeta-i{font-size:12px;flex-shrink:0}
.card-tags-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.tag-free{background:#DCFCE7;color:#166534}
.tag-outdoor{background:#DBEAFE;color:#1E40AF}
.tag-indoor{background:#EDE9FE;color:#5B21B6}
.tag-toddler-friendly{background:#FEF9C3;color:#713F12}
.tag-daytrip{background:#FFEDD5;color:#9A3412}
/* active reaction tags on card */
.rtag-active{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;display:inline-flex;align-items:center;gap:2px}
.rtag-jeff{background:var(--jeff-bg);color:var(--jeff)}
.rtag-tania{background:var(--tania-bg);color:var(--tania)}
.rtag-both{background:var(--both-bg);color:var(--both)}

/* CARD VOTES */
.card-votes{border-top:1px solid var(--border);background:#FAFAF8;padding:9px 12px;display:flex;flex-direction:column;gap:7px}
.voter-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.vlbl{font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;white-space:nowrap;margin-right:2px}
.vlbl-j{background:var(--jeff-bg);color:var(--jeff)}
.vlbl-t{background:var(--tania-bg);color:var(--tania)}
.vbtn{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--border2);background:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.vbtn:hover{border-color:#999;background:var(--bg)}
.vbtn.v-up{background:var(--green-bg);border-color:var(--green)}
.vbtn.v-dn{background:var(--red-bg);border-color:var(--red)}
.vbtn.v-skip{background:var(--skip-bg);border-color:var(--skip)}
.skip-btn{height:26px;padding:0 8px;border-radius:7px;border:1.5px solid var(--border2);background:#fff;cursor:pointer;font-size:10px;font-weight:700;color:var(--muted);transition:all .12s;white-space:nowrap;flex-shrink:0}
.skip-btn:hover{border-color:var(--skip);color:var(--skip)}
.skip-btn.active{background:var(--skip-bg);border-color:var(--skip);color:var(--skip)}
/* reaction tags row */
.rtags-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding-top:2px}
.rt-btn{height:24px;padding:0 7px;border-radius:20px;border:1.5px solid var(--border2);background:#fff;cursor:pointer;font-size:10px;font-weight:700;color:var(--muted);transition:all .12s;white-space:nowrap;display:inline-flex;align-items:center;gap:2px}
.rt-btn:hover{border-color:var(--muted)}
.rt-btn.j-on{background:var(--jeff-bg);border-color:var(--jeff);color:var(--jeff)}
.rt-btn.t-on{background:var(--tania-bg);border-color:var(--tania);color:var(--tania)}
.rt-btn.b-on{background:var(--both-bg);border-color:var(--both);color:var(--both)}
/* bottom row */
.card-btm{display:flex;align-items:center;gap:8px;padding-top:6px;border-top:1px solid var(--border);margin-top:2px}
.did-it-btn{height:28px;padding:0 10px;border-radius:8px;border:1.5px solid var(--border2);background:#fff;cursor:pointer;font-size:11px;font-weight:700;color:var(--muted);transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px}
.did-it-btn:hover{border-color:var(--done);color:var(--done)}
.did-it-btn.went{background:var(--done-bg);border-color:var(--done);color:var(--done)}
.src-lnk{margin-left:auto;font-size:10px;color:var(--muted2);text-decoration:none;border-bottom:1px dotted var(--muted2);white-space:nowrap}
.src-lnk:hover{color:var(--text)}

/* DETAIL SHEET */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:500;display:none;align-items:flex-end;justify-content:center}
.sheet-bg.open{display:flex}
.sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh3)}
.sheet-drag-w{padding:14px;display:flex;justify-content:center}
.sheet-drag{width:36px;height:4px;background:var(--border2);border-radius:4px}
.sheet-hero{height:160px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.sheet-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.sheet-hero-e{font-size:60px;position:relative;z-index:2;filter:drop-shadow(0 3px 8px rgba(0,0,0,.2))}
.sheet-bd{padding:20px 22px 0}
.sh-cat{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:8px}
.sh-title{font-size:21px;font-weight:800;letter-spacing:-.5px;line-height:1.25;margin-bottom:8px}
.sh-desc{font-size:14px;color:var(--muted);line-height:1.65;margin-bottom:18px}
.sh-details{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.sh-dr{display:flex;align-items:flex-start;gap:12px}
.sh-di{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.sh-dl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.sh-dv{font-size:14px;line-height:1.4}
.sh-dv a{color:var(--jeff)}
/* Sheet sections */
.sh-sec{background:var(--bg);border-radius:14px;padding:15px;margin-bottom:12px}
.sh-sec-t{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
/* Sheet voter rows */
.sh-vr{display:flex;align-items:flex-start;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.sh-vr:last-child{margin-bottom:0}
.sh-vname{font-size:14px;font-weight:800;width:54px;flex-shrink:0;padding-top:5px}
.sh-vbtns{display:flex;flex-direction:column;gap:6px;flex:1}
.sh-main-btns{display:flex;gap:6px;flex-wrap:wrap}
.sh-mbtn{padding:7px 14px;border-radius:9px;border:1.5px solid var(--border2);background:var(--surface);font-size:14px;cursor:pointer;transition:all .12s;font-weight:700;white-space:nowrap}
.sh-mbtn:hover{border-color:#999}
.sh-mbtn.up-a{background:var(--green-bg);border-color:var(--green)}
.sh-mbtn.dn-a{background:var(--red-bg);border-color:var(--red)}
.sh-mbtn.sk-a{background:var(--skip-bg);border-color:var(--skip)}
/* tag palette */
.tag-palette{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.tp-btn{padding:5px 10px;border-radius:20px;border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;font-size:12px;font-weight:700;transition:all .12px;display:flex;align-items:center;gap:4px;white-space:nowrap}
.tp-btn:hover{border-color:var(--muted)}
.tp-btn.j-on{background:var(--jeff-bg);border-color:var(--jeff);color:var(--jeff)}
.tp-btn.t-on{background:var(--tania-bg);border-color:var(--tania);color:var(--tania)}
.tp-btn.b-on{background:var(--both-bg);border-color:var(--both);color:var(--both)}
/* Did it section */
.sh-did-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sh-did-btn{padding:9px 18px;border-radius:10px;border:2px solid var(--border2);background:var(--surface);cursor:pointer;font-size:14px;font-weight:800;transition:all .15s;display:flex;align-items:center;gap:7px}
.sh-did-btn:hover{border-color:var(--done);color:var(--done)}
.sh-did-btn.went{background:var(--done-bg);border-color:var(--done);color:var(--done)}
.sh-did-note{font-size:12px;color:var(--muted);line-height:1.5;flex:1}
/* Notes */
.notes-ta{width:100%;padding:10px 13px;border:1.5px solid var(--border2);border-radius:10px;font-size:13.5px;font-family:inherit;resize:vertical;min-height:80px;background:var(--surface);line-height:1.55}
.notes-ta:focus{outline:none;border-color:var(--text)}
.notes-ft{display:flex;align-items:center;gap:10px;margin-top:8px}
.notes-save{padding:7px 18px;border-radius:8px;border:none;background:var(--text);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.notes-hint{font-size:11px;color:var(--muted)}

/* PREFERENCES */
.prefs-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--sh1);overflow:hidden;margin-top:10px}
.prefs-hdr{padding:15px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.prefs-hdr h2{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
.prefs-chev{font-size:12px;color:var(--muted);transition:transform .2s}
.prefs-chev.open{transform:rotate(180deg)}
.prefs-body{padding:0 18px 18px;display:none}
.prefs-body.open{display:block}
.prefs-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:500px){.prefs-grid{grid-template-columns:1fr}}
.pc h3{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.pi{display:flex;align-items:flex-start;gap:7px;padding:6px 8px;background:var(--bg);border-radius:8px;margin-bottom:5px;font-size:13px}
.pi-i{font-size:15px;flex-shrink:0}
.prefs-empty{font-size:13px;color:var(--muted);font-style:italic}
.prefs-tags-section{margin-bottom:14px}
.prefs-tags-section h3{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.pt-row{display:flex;gap:6px;flex-wrap:wrap}
.pt-chip{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700}
.pt-chip-j{background:var(--jeff-bg);color:var(--jeff)}
.pt-chip-t{background:var(--tania-bg);color:var(--tania)}
.pt-chip-b{background:var(--both-bg);color:var(--both)}
.prefs-insight{padding:12px 16px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;font-size:12.5px;color:#92400E;line-height:1.6}

/* ADD MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:600;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:18px;padding:26px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:var(--sh3)}
.modal h2{font-size:18px;font-weight:800;margin-bottom:18px}
.fg{margin-bottom:12px}
.fg label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.fg input,.fg textarea,.fg select{width:100%;padding:9px 12px;border:1.5px solid var(--border2);border-radius:9px;font-size:14px;font-family:inherit;background:var(--bg)}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--text)}
.fg textarea{min-height:70px;resize:vertical}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chk-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
.chk-row label{font-size:13px;display:flex;align-items:center;gap:5px;font-weight:normal;color:var(--text);text-transform:none;letter-spacing:0}
.m-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-sec{padding:9px 18px;border-radius:9px;border:1.5px solid var(--border2);background:var(--surface);font-size:14px;cursor:pointer;font-weight:700}
.btn-pri{padding:9px 20px;border-radius:9px;border:none;background:var(--text);color:#fff;font-size:14px;font-weight:700;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:var(--text);color:#fff;padding:10px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:700;opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:var(--sh2)}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">­¤ī¤</div>
    <div>
      <div class="hdr-title">Mia's Weekend Adventures</div>
      <div class="hdr-sub">Downtown Brooklyn ┬Ę Jeff + Tania + Mia (3) ┬Ę Updated every Saturday</div>
    </div>
  </div>
  <button class="hdr-add" onclick="openModal()">’╝ŗ Add Activity</button>
</div>

<div class="layout">
  <div class="cal-section">
    <div class="month-tabs" id="monthTabs"></div>
    <div class="cal-card">
      <div class="cal-gh-row">
        <div class="cal-gh wk">Su</div><div class="cal-gh">Mo</div><div class="cal-gh">Tu</div>
        <div class="cal-gh">We</div><div class="cal-gh">Th</div><div class="cal-gh">Fr</div>
        <div class="cal-gh wk">Sa</div>
      </div>
      <div class="cal-body" id="calBody"></div>
    </div>
    <div class="prefs-card">
      <div class="prefs-hdr" onclick="togglePrefs()">
        <h2>­¤¦Ā Preference Tracker</h2>
        <span class="prefs-chev" id="prefsChev">Ō¢╝</span>
      </div>
      <div class="prefs-body" id="prefsBody"></div>
    </div>
  </div>

let votes={};
let custom=[];
let currentMonth=0;
let selectedDate=null;
let prefsOpen=false;
let expandedDays=new Set();

function load(){
  try{
    const v=localStorage.getItem('mia_v4');if(v)votes=JSON.parse(v);
    const cu=localStorage.getItem('mia_cx');if(cu)custom=JSON.parse(cu);
    const m=localStorage.getItem('mia_mo');if(m!==null)currentMonth=+m;
    const d=localStorage.getItem('mia_dt');if(d&&WKND_DATES.includes(d))selectedDate=d;
    // clamp month index to valid range
    if(currentMonth>=MONTHS.length)currentMonth=0;
  }catch(e){}
  // auto-select current weekend on first load
  if(!selectedDate)selectedDate='2026-07-04';
}
function sv(){localStorage.setItem('mia_v4',JSON.stringify(votes))}
function sc(){localStorage.setItem('mia_cx',JSON.stringify(custom))}
function aa(){return[...ACTIVITIES,...custom]}
function gv(id){return votes[id]||{}}
function gVote(id,p){return gv(id)[p]||0}
function gSkip(id,p){return!!gv(id)[p+'Skip']}
function gTags(id,p){return gv(id)[p+'Tags']||[]}
function gNote(id){return gv(id).notes||''}
function gDid(id){return!!gv(id).didIt}
function ensV(id){if(!votes[id])votes[id]={}}

function setVote(id,p,val,e){
  if(e)e.stopPropagation();
  ensV(id);
  votes[id][p]=(votes[id][p]===val)?0:val;
  if(votes[id][p]!==0)votes[id][p+'Skip']=false;
  sv();rer();
}
function setSkip(id,p,e){
  if(e)e.stopPropagation();
  ensV(id);
  votes[id][p+'Skip']=!votes[id][p+'Skip'];
  if(votes[id][p+'Skip'])votes[id][p]=0;
  sv();rer();
  if(document.getElementById('sheetBg').classList.contains('open'))openSheet(id);
}
function toggleTag(id,p,key,e){
  if(e)e.stopPropagation();
  ensV(id);
  const arr=votes[id][p+'Tags']||[];
  const i=arr.indexOf(key);
  if(i>=0)arr.splice(i,1);else arr.push(key);
  votes[id][p+'Tags']=arr;
  sv();rer();
  if(document.getElementById('sheetBg').classList.contains('open'))openSheet(id);
}
function toggleDidIt(id,e){
  if(e)e.stopPropagation();
  ensV(id);
  votes[id].didIt=!votes[id].didIt;
  sv();rer();
  if(document.getElementById('sheetBg').classList.contains('open'))openSheet(id);
  showToast(votes[id].didIt?'Ō£ģ Marked as done!':'Unmarked');
}
function saveNote(id){
  const val=document.getElementById('noteArea_'+id).value.trim();
  ensV(id);votes[id].notes=val;sv();rer();
  showToast(val?'Note saved Ō£ō':'Note cleared');
}

// ŌöĆŌöĆ CALENDAR ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function renderMonthTabs(){
  document.getElementById('monthTabs').innerHTML=MONTHS.map((m,i)=>
    `<button class="mtab${i===currentMonth?' active':''}" onclick="selMonth(${i})">${m.name}</button>`
  ).join('');
}
function selMonth(i){currentMonth=i;localStorage.setItem('mia_mo',i);renderMonthTabs();renderCal()}

function ds(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}

function renderCal(){
  const{year,month}=MONTHS[currentMonth];
  const fdow=new Date(year,month,1).getDay();
  const days=new Date(year,month+1,0).getDate();
  const am={};aa().forEach(a=>{if(!am[a.day])am[a.day]=[];am[a.day].push(a)});
  let html='';
  for(let i=0;i<fdow;i++)html+=`<div class="cal-cell"></div>`;
  for(let d=1;d<=days;d++){
    const dateStr=ds(year,month,d);
    const dow=(fdow+d-1)%7;
    const isW=WKND_DATES.includes(dateStr);
    const isSel=dateStr===selectedDate;
    const acts=am[dateStr]||[];
    const isDone=acts.some(a=>gDid(a.id));
    let cls='cal-cell';
    if(isW)cls+=' wknd';
    if(isSel)cls+=' sel';
    if(isDone&&isW)cls+=' done-cell';
    const dots=acts.slice(0,6).map(a=>`<div class="cal-dot" style="background:${c(a.category).d}"></div>`).join('');
    html+=`<div class="${cls}"${isW?` onclick="selDate('${dateStr}')"`:''}>`
      +`<span class="cal-num">${d}</span>`
      +(acts.length?`<div class="cal-dots">${dots}</div><span class="cal-cnt">${acts.length}</span>`:'')
      +(isDone?`<span class="cal-done-check">Ō£ģ</span>`:'')
      +`</div>`;
  }
  document.getElementById('calBody').innerHTML=html;
}

function selDate(dateStr){
  selectedDate=dateStr;localStorage.setItem('mia_dt',dateStr);
  renderCal();renderActs();
}

// ŌöĆŌöĆ RENDERING HELPERS ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function mkTag(t){
  const m={'free':'Free','outdoor':'Outdoor','indoor':'Indoor','toddler-friendly':'Toddler Ō£ō','daytrip':'Day Trip'};
  return`<span class="tag tag-${t.replace(/-friendly$|trip$/,'').replace(/-/g,'')}">${m[t]||t}</span>`;
}

function tagClass(id,p,key){
  const jhas=gTags(id,'jeff').includes(key),thas=gTags(id,'tania').includes(key);
  if(p==='jeff')return jhas?(thas?'b-on':'j-on'):'';
  if(p==='tania')return thas?(jhas?'b-on':'t-on'):'';
  return'';
}

function activeTags(id){
  const allKeys=new Set([...gTags(id,'jeff'),...gTags(id,'tania')]);
  return[...allKeys].map(k=>{
    const t=RTAGS.find(r=>r.k===k);if(!t)return'';
    const jh=gTags(id,'jeff').includes(k),th=gTags(id,'tania').includes(k);
    const cls=jh&&th?'rtag-both':jh?'rtag-jeff':'rtag-tania';
    const who=jh&&th?'both':jh?'Jeff':'Tania';
    return`<span class="rtag-active ${cls}">${t.e} ${t.l} <span style="opacity:.7;font-size:9px">${who}</span></span>`;
  }).join('');
}

    <div class="rtags-row">

        const jh=gTags(a.id,'jeff').includes(t.k),th=gTags(a.id,'tania').includes(t.k);

function renderDayBlock(dateStr,dayName){
  const all=aa().filter(a=>a.day===dateStr);
  const isExp=expandedDays.has(dateStr);
  const shown=isExp?all:all.slice(0,5);
  const extra=all.length-5;
  const doneCount=all.filter(a=>gDid(a.id)).length;
  const d=new Date(dateStr+'T12:00:00');
  const label=d.toLocaleDateString('en-US',{month:'long',day:'numeric'});
  return`<div class="day-block">
    <div class="day-hdr">
      <span class="day-name">${dayName}</span>
      <span class="day-date">${label}</span>
      <span class="day-badge${doneCount?` done-badge`:''}">${doneCount?`Ō£ģ ${doneCount} done ┬Ę `:''}${all.length} pick${all.length!==1?'s':''}</span>
    </div>
    <div class="cards-grid">${shown.length?shown.map(renderCard).join(''):'<div class="empty-day">No activities yet ŌĆö Claude will add picks on the next scan ­¤öŹ</div>'}</div>
    ${extra>0&&!isExp?`<button class="show-more-btn" onclick="expandDay('${dateStr}')">Show ${extra} more option${extra!==1?'s':''} ŌåÆ</button>`:''}
    ${isExp&&all.length>5?`<button class="show-more-btn" onclick="collapseDay('${dateStr}')">ŌåÉ Show fewer</button>`:''}
  </div>`;
}

function expandDay(ds){expandedDays.add(ds);renderActs()}
function collapseDay(ds){expandedDays.delete(ds);renderActs()}

function renderActs(){
  const el=document.getElementById('actsSection');
  if(!selectedDate){el.innerHTML=`<div class="no-sel"><span class="ns-e">­¤ōģ</span><h3>Pick a weekend on the calendar</h3><p>Tap any highlighted Saturday or Sunday to see that day's picks for Mia's family.</p></div>`;return}
  const paired=PAIR[selectedDate];
  const d=new Date(selectedDate+'T12:00:00');
  const dow=d.getDay();
  const satDate=dow===6?selectedDate:paired;

  el.innerHTML=`<div style="display:flex;flex-direction:column;gap:0">${satDate?renderDayBlock(satDate,'Saturday'):''}${sunDate?renderDayBlock(sunDate,'Sunday'):''}${renderPrefsBlock()}
  <div style="display:flex;justify-content:center;margin-top:4px"><button class="hdr-add" onclick="openModal()">’╝ŗ Add Activity</button></div></div>`;

// ŌöĆŌöĆ PREFERENCES ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function prefsContent(){
  const all=aa();
  const hasV=a=>{const v=gv(a.id);return v.jeff||v.tania||v.jeffSkip||v.taniaSkip||(v.jeffTags||[]).length||(v.taniaTags||[]).length||v.notes};
  const voted=all.filter(hasV);
  if(!voted.length)return`<p class="prefs-empty">Start voting and tagging activities ŌĆö this panel learns your family's tastes over time.</p>`;
  const bothLove=voted.filter(a=>gVote(a.id,'jeff')===1&&gVote(a.id,'tania')===1);
  const bothPass=voted.filter(a=>gVote(a.id,'jeff')===-1&&gVote(a.id,'tania')===-1);
  const jOnly=voted.filter(a=>gVote(a.id,'jeff')===1&&gVote(a.id,'tania')!==1&&!gSkip(a.id,'jeff'));
  const tOnly=voted.filter(a=>gVote(a.id,'tania')===1&&gVote(a.id,'jeff')!==1&&!gSkip(a.id,'tania'));
  const done=voted.filter(a=>gDid(a.id));
  const jTagCnt={},tTagCnt={};
  voted.forEach(a=>{gTags(a.id,'jeff').forEach(k=>jTagCnt[k]=(jTagCnt[k]||0)+1);gTags(a.id,'tania').forEach(k=>tTagCnt[k]=(tTagCnt[k]||0)+1)});
  const topJTags=Object.entries(jTagCnt).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([k])=>RTAGS.find(r=>r.k===k)).filter(Boolean);
  const topTTags=Object.entries(tTagCnt).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([k])=>RTAGS.find(r=>r.k===k)).filter(Boolean);
  const piList=(items)=>items.slice(0,3).map(a=>`<div class="pi"><span class="pi-i">${c(a.category).e}</span><span>${a.title}</span></div>`).join('');
  const empty=s=>`<p class="prefs-empty">${s}</p>`;
  return`
  <div class="prefs-grid">
    <div class="pc"><h3>­¤ÆÜ Both Interested</h3>${bothLove.length?piList(bothLove):empty('Keep voting!')}</div>
    <div class="pc"><h3>ŌØī Both Pass</h3>${bothPass.length?piList(bothPass):empty('None yet')}</div>
    <div class="pc"><h3>­¤ÆÖ Jeff Wants</h3>${jOnly.length?piList(jOnly):empty('None yet')}</div>
    <div class="pc"><h3>­¤ÆŚ Tania Wants</h3>${tOnly.length?piList(tOnly):empty('None yet')}</div>
  </div>
  ${done.length?`<div class="pc" style="margin-bottom:14px"><h3>Ō£ģ Went & Did It (${done.length})</h3><div style="display:flex;flew-wrap:wrap;gap:5px">${done.slice(0,6).map(a=>`<span style="font-size:12px;padding:3px 9px;background:var(--done-bg);color:var(--done);border-radius:20px;font-weight:700">${c(a.category).e} ${a.title.length>28?a.title.slice(0,28)+'ŌĆ”':a.title}</span>`).join('')}</div></div>`:``}
 ${topJTags.length||topTTags.length?`<div class="prefs-tags-section"><h3>Reaction Tag Patterns</h3><div class="pt-row">
    ${topJTags.map(t=>`<span class="pt-chip pt-chip-j">Jeff: ${t.e} ${t.l}</span>`).join('')}
    ${topTTags.map(t=>`<span class="pt-chip pt-chip-t">Tania: ${t.e} ${t.l}</span>`).join('')}
  </div></div>`:''}
  <div class="prefs-insight"><strong>­¤ōŖ ālaude is tracking:</strong> your votes, skips, reaction tags, and which activities you actually did. The weekly scan uses all of this to refine future picks ŌĆö more of what you both love, less of what got ­¤æó or ­¤ÆĖ’°ö tags from both of you.</div>`;
}

function renderPrefsBlock(){
  return`<div class="prefs-card" style="margin-top:24px;margin-bottom:20px">
    <div class="prefs-hdr" onclick="togglePrefs()"><h2>­¤¦Ī Preference Tracker</h2><span class="prefs-chev${prefsOpen?' open':''}" id="prefsChev">Ō¢╝</span></div>
    <div class="prefs-body${prefsOpen?' open':''}" id="prefsBody">${prefsOpen?prefsContent():''}</div>
  </div>`;
}

function togglePrefs(){
  prefsOpen=!prefsOpen;
  const b=document.getElementById('prefsBody');
  const ch=document.getElementById('prefsChev');
  if(b){b.innerHTML=prefsOpen?prefsContent():'';b.classList.toggle('open',prefsOpen)}
  if(ch)ch.classList.toggle('open',prefsOpen);
}

function openSheet(id){
  const a=aa().find(x=>x.id===id);if(!a)return;
  const jv=gVote(id,'jeff'),tv=gVote(id,'tania');
  const jsk=gSkip(id,'jeff'),tsk=gSkip(id,'tania');
  const did=gDid(id),note=gNote(id);
  const cat=c(a.category);
  const imgH=a.imageUrl?`<img src="${a.imageUrl}" alt="" onerror="this.style.display='none'">`:'';

  const tagPalette=(p)=>RTAGS.map(t=>{
    const jh=gTags(id,'jeff').includes(t.k),ourh=gTags(id,'tania').includes(t.k);
    let cls='';
    if(p==='jeff'&&jh)cls=jh&&th?'b-on':'j-on';
    if(p==='tania'&&th)cls=jh&&th?'b-on':'t-on';
    return`<button class="tp-btn${cls?' '+cls:''}" onclick="toggleTag('${id}','${p}','${t.k}',event)">${t.e} ${t.l}</button>`;
  }).join('');

  document.getElementById('sheetContent').innerHTML=`
    <div class="sheet-hero" style="background:${cat.g}">${imgH}<span class="sheet-hero-e">${cat.e}</span></div>
    <div class="sheet-bd">
      <span class="sh-cat" style="background:${cat.p};color:${cat.pt}">${cat.n}</span>
      <h2 class="sh-title">${a.title}</h2>
      <p class="sh-desc">${a.desc}</p>
      <div class="sh-details">
        <div class="sh-dr"><span class="sh-di">­¤ĢÉ</span><div><div class="sh-dl">When</div><div class="sh-dv">${a.timing}</div></div></div>
        <div class="sh-dr"><span class="sh-di">­¤ōŹ</span><div><div class="sh-dl">Where</div><div class="sh-dv">${a.location}</div></div></div>
        ${a.distance?`<div class="sh-dr"><span class="sh-di">­¤Üć</span><div><div class="sh-dl">Distance</div><div class="sh-dv">${a.distance}</div></div></div>`:''}
        <div class="sh-dr"><span class="sh-di">­¤öŚ</span><div><div class="sh-dl">Source</div><div class="sh-dv"><a href="${a.sourceUrl||'#'}" target="_blank">${a.source} ŌåŚ</a></div></div></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:18px">${(a.tags||[]).map(mkTag).join('')}</div>

      <div class="sh-sec">
        <div class="sh-sec-t">Reactions</div>
        <div class="sh-vr">
          <span class="sh-vname" style="color:var(--jeff)">Jeff</span>
          <div class="sh-vbtns">
            <div class="sh-main-btns">
              <button class="sh-mbtn${jv===1?' up-a':''}" onclick="setVote('${id}','jeff',1,event);openSheet('${id}')">­¤æŹ Yes!</button>
              <button class="sh-mbtn${jv===-1?' dn-a':''}" onclick="setVote('${id}','jeff',-1,event);openSheet('${id}')">­¤æÄ Nope</button>
              <button class="sh-mbtn${jsk?' sk-a':''}" onclick="setSkip('${id}','jeff',event)">ŌÅŁ’ĖÅ Not this wknd</button>
            </div>
            <div class="tag-palette">${tagPalette('jeff')}</div>
          </div>
        </div>
        <div class="sh-vr">
          <span class="sh-vname" style="color:var(--tania)">Tania</span>
          <div class="sh-vbtns">
            <div class="sh-main-btns">
              <button class="sh-mbtn${tv===1?' up-a':''}" onclick="setVote('${id}','tania',1,event);openSheet('${id}')">­¤æŹ Yes!</button>
              <button class="sh-mbtn${tv===-1?' dn-a':''}" onclick="setVote('${id}','tania',-1,event);openSheet('${id}')">­¤æÄ Nope</button>
              <button class="sh-mbtn${tsk?' sk-a':''}" onclick="setSkip('${id}','tania',event)">ŌÅŁ’ĖÅ Not this wknd</button>
            </div>
            <div class="tag-palette">${tagPalette('tania')}</div>
          </div>
        </div>
      </div>

      <div class="sh-sec">
        <div class="sh-sec-t">Did We Go?</div>
        <div class="sh-did-row">
          <button class="sh-did-btn${did?' went':''}" onclick="toggleDidIt('${id}',event)">${did?'Ō£ģ We went!':'Ōśæ’ĖÅ Mark as Done'}</button>
          <p class="sh-did-note">${did?'Marked as done ŌĆö the preference tracker counts this as a positive signal for this type of activity.':'Tap after you go to track what you\'ve actually done. Helps Claude learn what worked.'}</p>
        </div>
      </div>

      <div class="sh-sec">
        <div class="sh-sec-t">­¤ōØ Notes & Thoughts</div>
        <textarea class="notes-ta" id="noteArea_${id}" placeholder="Logistics, questions, past experience, Mia's reaction, anything...">${note}</textarea>
        <div class="notes-ft">
          <button class="notes-save" onclick="saveNote('${id}')">Save</button>
          <span class="notes-hint">Shared ┬Ę persists across sessions</span>
        </div>
      </div>
    </div>`;
  document.getElementById('sheetBg').classList.add('open');
}
function bgClose(e){if(e.target===document.getElementById('sheetBg'))document.getElementById('sheetBg').classList.remove('open')}

  const title=document.getElementById('mTitle').value.trim(),date=document.getElementById('mDate').value;

  const tags=[];
  if(document.getElementById('tFree').checked)tags.push('free');

  if(document.getElementById('tTod').checked)tags.push('toddler-friendly');

  custom.push({id:'c'+Date.now(),title,desc:document.getElementById('mDesc').value.trim(),timing:document.getElementById('mTiming').value.trim(),location:document.getElementById('mLoc').value.trim(),distance:document.getElementById('mDist').value.trim(),source:'Added by family',sourceUrl:document.getElementById('mUrl').value.trim(),imageUrl:'',day:date,category:document.getElementById('mCat').value,tags,custom:true});

}
